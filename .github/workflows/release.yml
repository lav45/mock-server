name: release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout.
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v4

      - run: |
          VERSION_PATCH=${GITHUB_REF#refs/tags/}
          echo "VERSION_PATCH=$VERSION_PATCH" >> $GITHUB_ENV
          VERSION_MINOR=$(echo $VERSION_PATCH | awk -F. '{print $1"."$2}')
          echo "VERSION_MINOR=$VERSION_MINOR" >> $GITHUB_ENV
          VERSION_MAJOR=$(echo $VERSION_PATCH | awk -F. '{print $1}')
          echo "VERSION_MAJOR=$VERSION_MAJOR" >> $GITHUB_ENV

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: ./Dockerfile
          target: server
          platforms: "linux/amd64,linux/arm64,linux/arm/v7"
          tags: |
            lav45/mock-server:latest
            lav45/mock-server:${{ env.VERSION_PATCH }}
            lav45/mock-server:${{ env.VERSION_MINOR }}
            lav45/mock-server:${{ env.VERSION_MAJOR }}
