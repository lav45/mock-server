deptrac:
  paths:
    - ./src
    - ./vendor

  layers:
    - name: Bootstrap
      collectors:
        - type: classNameRegex
          value: ~^Lav45\\MockServer\\Bootstrap\\.*~

    - name: Domain
      collectors:
        - type: classNameRegex
          value: ~^Lav45\\MockServer\\Domain\\.*~

    - name: Http
      collectors:
        - type: classNameRegex
          value: ~^Lav45\\MockServer\\Http\\.*~

    - name: Parser
      collectors:
        - type: classNameRegex
          value: ~^Lav45\\MockServer\\Parser\\.*~

    - name: Responder
      collectors:
        - type: classNameRegex
          value: ~^Lav45\\MockServer\\Responder\\.*~

    - name: Router
      collectors:
        - type: classNameRegex
          value: ~^Lav45\\MockServer\\Router\\.*~

    - name: Vendor
      collectors:
        - type: directory
          value: ./vendor

  ruleset:
    Bootstrap:
      - Vendor
    Http:
      - Domain
      - Vendor
    Parser:
      - Vendor
    Responder:
      - Http
      - Domain
      - Vendor
    Router:
      - Bootstrap
      - Http
      - Domain
      - Parser
      - Vendor