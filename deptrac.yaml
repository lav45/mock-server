deptrac:
  paths:
    - ./src
    - ./vendor

  layers:
    - name: Bootstrap
      collectors:
        - type: classNameRegex
          value: ~^Lav45\\MockServer\\Bootstrap\\.*~

    - name: DataFactory
      collectors:
        - type: classNameRegex
          value: ~^Lav45\\MockServer\\DataFactory\\.*~

    - name: Domain
      collectors:
        - type: classNameRegex
          value: ~^Lav45\\MockServer\\Domain\\.*~

    - name: Driver
      collectors:
        - type: classNameRegex
          value: ~^Lav45\\MockServer\\Driver\\.*~

    - name: Engine
      collectors:
        - type: classNameRegex
          value: ~^Lav45\\MockServer\\Engine\\.*~

    - name: Extension
      collectors:
        - type: classNameRegex
          value: ~^Lav45\\MockServer\\Extension\\.*~

    - name: Parser
      collectors:
        - type: classNameRegex
          value: ~^Lav45\\MockServer\\Parser\\.*~

    - name: Vendor
      collectors:
        - type: directory
          value: ./vendor

  ruleset:
    Bootstrap:
      - DataFactory
      - Domain
      - Engine
      - Extension
      - Parser
      - Vendor
    Extension:
      - DataFactory
      - Parser
      - Domain
      - Engine
      - Vendor
    DataFactory:
      - Domain
      - Engine
      - Parser
      - Vendor
    Parser:
      - Vendor
    Engine:
      - Domain
    Driver:
      - Extension
      - Domain
      - Engine
      - Vendor